<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520" role="img" aria-labelledby="title desc">
  <title id="title">Codex App quota menu screenshot style illustration</title>
  <desc id="desc">A dark Codex App sidebar menu showing remaining usage at 98 percent for five hours and 97 percent for one week.</desc>
  <defs>
