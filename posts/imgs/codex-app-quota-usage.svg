      <stop offset="1" stop-color="#32312f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#111" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="820" height="520" fill="#f7f5ef"/>
  <g filter="url(#shadow)">
    <rect x="92" y="42" width="626" height="436" rx="18" fill="url(#bg)"/>
